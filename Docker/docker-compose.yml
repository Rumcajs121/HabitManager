services:
  habit-manager:
    image: ${DOCKER_REGISTRY-}habitmanager
    build:
      context: ..
      dockerfile: HabitManager.App/HabitManager/Dockerfile
    ports:
      - "5100:8080"
      - "5101:8081"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://aspire-dashboard:18889
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
  aspire-dashboard:
    container_name: aspire-dashboard
    image: mcr.microsoft.com/dotnet/aspire-dashboard:13.0
    ports:
      - 18888:18888
  