services:
  habit-manager:
    image: ${DOCKER_REGISTRY-}habitmanager
    build:
      context: ..
      dockerfile: HabitManager.App/HabitManager/Dockerfile
    ports:
      - "5100:8080"
      - "5101:8081"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://aspire-dashboard:18889
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
  aspire-dashboard:
    container_name: aspire-dashboard
    image: mcr.microsoft.com/dotnet/aspire-dashboard:13.0
    ports:
      - 18888:18888
  mongo-db:
    image: mongodb/mongodb-community-server:latest
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: 1qazXSW@
volumes:
  mongo_data:
